name: 'BeeWare Multi-Platform Builder'
description: 'Build native installers for BeeWare/Toga apps across macOS, Windows, Linux, and Android'
author: 'Levi'

branding:
  icon: 'upload-cloud'  # Closest to airdrop
  color: 'blue'  # Baby blue theme

inputs:
  platform:
    description: 'Target platform to build (macOS, Windows, Linux, or Android)'
    required: true
  
  python-version:
    description: 'Python version to use for building'
    required: false
    default: '3.11'
  
  briefcase-version:
    description: 'Briefcase version to install'
    required: false
    default: 'latest'
  
  output-path:
    description: 'Directory to output built packages'
    required: false
    default: 'dist'

outputs:
  artifact-path:
    description: 'Path to the built package file'
    value: ${{ steps.locate.outputs.path }}
  
  artifact-name:
    description: 'Filename of the built package'
    value: ${{ steps.locate.outputs.name }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          python3-dev \
          python3-venv \
          libgirepository1.0-dev \
          libcairo2-dev \
          libpango1.0-dev \
          libwebkit2gtk-4.0-dev

    - name: Set up Java for Android
      if: inputs.platform == 'Android'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Briefcase
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ "${{ inputs.briefcase-version }}" = "latest" ]; then
          pip install briefcase
        else
          pip install briefcase==${{ inputs.briefcase-version }}
        fi

    - name: Build Package
      shell: bash
      run: |
        briefcase create ${{ inputs.platform }} --no-input
        briefcase build ${{ inputs.platform }} --no-input
        briefcase package ${{ inputs.platform }} --no-input

    - name: Locate Built Artifact
      id: locate
      shell: bash
      run: |
        case "${{ inputs.platform }}" in
          macOS)
            ARTIFACT=$(find ${{ inputs.output-path }} -name "*.dmg" | head -n 1)
            ;;
          Windows)
            ARTIFACT=$(find ${{ inputs.output-path }} -name "*.msi" | head -n 1)
            ;;
          Linux)
            ARTIFACT=$(find ${{ inputs.output-path }} -name "*.AppImage" | head -n 1)
            ;;
          Android)
            ARTIFACT=$(find ${{ inputs.output-path }} -name "*.apk" | head -n 1)
            ;;
        esac
        
        if [ -z "$ARTIFACT" ]; then
          echo "::error::No artifact found for platform ${{ inputs.platform }}"
          exit 1
        fi
        
        echo "path=$ARTIFACT" >> $GITHUB_OUTPUT
        echo "name=$(basename $ARTIFACT)" >> $GITHUB_OUTPUT
        echo "::notice::Built package: $ARTIFACT"
