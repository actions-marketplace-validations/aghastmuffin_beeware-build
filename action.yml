name: BeeWare Multi-Platform Release

on:
  # 1. Manual Trigger: Adds the "Run workflow" button in the Actions tab
  workflow_dispatch:

  # 2. Tag Trigger: Runs when you push a version tag (e.g., v1.0.2)
  push:
    tags:
      - 'v*'
    # 3. Whitelist: Only triggers if actual app content changed
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/release.yml'

jobs:
  package:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Don't cancel other builds if one platform fails
      matrix:
        include:
          - target: macOS
            os: macos-latest
          - target: Windows
            os: windows-latest
          - target: Linux
            os: ubuntu-latest
          - target: Android
            os: ubuntu-latest
          - target: iOS
            os: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Caches pip dependencies automatically

      - name: Install System Dependencies (Linux/Android)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3-dev python3-venv libgirepository1.0-dev libcairo2-dev libpango1.0-dev libwebkit2gtk-4.0-dev

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Build Package
        # --no-input is critical for CI/CD to prevent the build from hanging
        run: |
          briefcase create ${{ matrix.target }} --no-input
          briefcase build ${{ matrix.target }} --no-input
          briefcase package ${{ matrix.target }} --no-input

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-Binary
          path: dist/*
          retention-days: 7 # Saves storage on your Pro account

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Automatically attaches the built files to the Release page
          files: |
            dist/*.msi
            dist/*.dmg
            dist/*.apk
            dist/*.aab
            dist/*.pkg
            dist/*.flatpak
          generate_release_notes: true # AI-generated changelog based on commits
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
