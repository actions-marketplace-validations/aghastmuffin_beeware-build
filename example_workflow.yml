# Example workflow showing how to use the BeeWare Multi-Platform Builder action
# Copy this to: .github/workflows/build.yml

name: 📦 Build and Release

on:
  # Build on every push to main
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'requirements.txt'
  
  # Build and release on version tags
  push:
    tags:
      - 'v*'
  
  # Manual trigger
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
          - platform: Windows
            os: windows-latest
          - platform: Linux
            os: ubuntu-latest
          - platform: Android
            os: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🏗️ Build ${{ matrix.platform }} Package
        id: build
        uses: YOUR_USERNAME/beeware-builder-action@v1
        with:
          platform: ${{ matrix.platform }}
          python-version: '3.11'
      
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-package
          path: ${{ steps.build.outputs.artifact-path }}
          retention-days: 7
  
  release:
    name: 🚀 Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
